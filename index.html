<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時光偵探學習單｜海山國小</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#faf8f2;color:#1a1a2e;max-width:480px;width:100%;padding:36px 32px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 24px,rgba(180,160,120,.06) 24px,rgba(180,160,120,.06) 25px),repeating-linear-gradient(90deg,transparent,transparent 24px,rgba(180,160,120,.04) 24px,rgba(180,160,120,.04) 25px);pointer-events:none;}
.card>*{position:relative;}
.school{font-size:11px;color:#6b6b7a;letter-spacing:.12em;margin-bottom:6px;}
h1{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:900;line-height:1.25;margin-bottom:4px;}
.sub{font-size:13px;color:#b8860b;font-weight:700;letter-spacing:.06em;margin-bottom:20px;}
.divider{border:none;border-top:2px solid #1a1a2e;margin-bottom:20px;}
.btn-group{display:flex;flex-direction:column;gap:12px;}
.btn{display:flex;align-items:center;gap:14px;padding:16px 18px;border:2px solid #c8b89a;background:#fff;color:#1a1a2e;text-decoration:none;transition:all .18s;cursor:pointer;}
.btn:hover{border-color:#b8860b;background:#f5e6a3;}
.btn-icon{font-size:28px;flex-shrink:0;}
.btn-text strong{display:block;font-size:15px;font-weight:700;margin-bottom:2px;}
.btn-text span{font-size:11px;color:#6b6b7a;}
.btn.primary{background:#1a1a2e;color:#f5e6a3;border-color:#1a1a2e;}
.btn.primary:hover{background:#b8860b;border-color:#b8860b;color:#1a1a2e;}
.btn.primary .btn-text span{color:rgba(245,230,163,.7);}
.footer{margin-top:24px;font-size:10px;color:#6b6b7a;text-align:center;letter-spacing:.05em;}
.badge{display:inline-block;background:#1a1a2e;color:#f5e6a3;font-size:10px;font-weight:700;padding:3px 8px;letter-spacing:.08em;margin-bottom:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="school">新北市板橋區海山國小｜國語文學習單</div>
  <div class="badge">數位素養篇</div>
  <h1>🕵️ 時光偵探<br>學習單</h1>
  <div class="sub">第三節：真相背後——數位素養與辨識</div>
  <hr class="divider">
  <div class="btn-group">
    <a href="student.html" class="btn primary">
      <span class="btn-icon">📝</span>
      <div class="btn-text">
        <strong>學生作答區</strong>
        <span>點此開始作答，完成後可儲存紀念卡</span>
      </div>
    </a>
    <a href="teacher.html" class="btn">
      <span class="btn-icon">📊</span>
      <div class="btn-text">
        <strong>教師後台</strong>
        <span>即時查看全班作答成效與統計圖表</span>
      </div>
    </a>
  </div>
  <div class="footer">
    資料庫：Firebase Firestore ｜ 圖片來源：eliteracy.edu.tw
  </div>
</div>
</body>
</html>
